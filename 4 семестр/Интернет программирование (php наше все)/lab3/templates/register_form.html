<!doctype html>
<html>

    <head>
        <title>Регистрация</title>
    </head>


    <body>

        <h1>Регистрация</h1>

        <div class="flexbox-container"> 
                
            <form action="/register" method="POST">

                <div>
                    <label>Логин:</label>
                    <input type="text" name="login" placeholder="МодныйКрокодил">
                </div>

                <div>
                    <label>Пароль:</label>
                    <input type="password" name="password" placeholder="UnhackablePassword">
                </div>

                <div>
                    <input type="submit">
                </div>

            </form>


        </div>

    </body>
</html>
