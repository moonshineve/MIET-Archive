<!DOCTYPE html>
<html>
<head>
    <title>Галерея</title>
    <style>
        * { box-sizing: border-box; font-family: Arial; }
        body { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; }
        .upload-form { background: #f5f5f5; padding: 20px; border-radius: 10px; margin: 20px 0; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .image-card { 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            padding: 10px;
            text-align: center;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .image-card img { 
            width: 100%; 
            height: 150px; 
            object-fit: cover;
            cursor: pointer;
            border-radius: 5px;
        }
        .image-title { 
            margin: 10px 0;
            font-weight: bold;
            word-break: break-word;
        }
        .delete-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
        }
        .modal img {
            max-width: 90%;
            max-height: 90%;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Галерея {{ user }}</h1>
    </div>

    <div class="upload-form">
        <h3>Загрузить изображение</h3>
        <form action="/upload" method="POST" enctype="multipart/form-data">
            <input type="text" name="title" placeholder="Название изображения" required><br>
            <input type="file" name="image" accept="image/*" required><br>
            <button type="submit">Загрузить</button>
        </form>
    </div>

    <div class="gallery">
        {% for img in images %}
        <div class="image-card">
            <img src="{{ img.thumb }}" onclick="openModal('{{ img.path }}')">
            <div class="image-title">{{ img.title }}</div>
            <a href="/delete/{{ img.name }}" class="delete-btn" onclick="return confirm('Удалить?')">Удалить</a>
        </div>
        {% else %}
        <p>Нет изображений. Загрузите первое!</p>
        {% endfor %}
    </div>

    <div id="modal" class="modal" onclick="closeModal()">
        <img id="modal-img">
    </div>

    <script>
        function openModal(src) {
            document.getElementById('modal-img').src = src;
            document.getElementById('modal').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>
</html>
